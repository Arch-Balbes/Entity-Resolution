random_state: 42
negative_multiplier: 3
test_size: 0.2

catboost:
  iterations: 150
  depth: 6
  learning_rate: 0.08
  loss_function: Logloss
  eval_metric: AUC

thresholds:
  target_precisions: [0.90, 0.95, 0.98, 0.99]
  auto_merge_precision: 0.99
  manual_review_precision: 0.90

paths:
  data_dir: data
  artifacts_dir: artifacts
